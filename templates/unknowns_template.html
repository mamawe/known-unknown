<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>未知项扫描报告</title>
    <style>
        body { font-family: sans-serif; background: #f9f9f9; padding: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; max-width: 800px; margin: auto; }
        .card { border-radius: 8px; padding: 15px; color: #333; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .card h3 { margin-top: 0; border-bottom: 1px solid rgba(0,0,0,0.1); padding-bottom: 8px; }
        .green { background: #e3fcef; border-left: 5px solid #00875a; }
        .yellow { background: #fffae6; border-left: 5px solid #ffab00; }
        .purple { background: #f4f1ff; border-left: 5px solid #6554c0; }
        .red { background: #ffebe6; border-left: 5px solid #de350b; }
        .cta { text-align: center; margin-top: 20px; max-width: 800px; margin: 20px auto; background: #fff; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        details { margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="grid">
        <div class="card green">
            <h3>🟢 已知的已知</h3>
            <p>写在提示词里的明确需求：</p>
            <ul>
                <li>需求1占位符</li>
                <li>需求2占位符</li>
            </ul>
        </div>
        <div class="card yellow">
            <h3>🟡 已知的未知</h3>
            <p>需要您立刻回答的问题：</p>
            <ul>
                <li>问题1占位符？</li>
                <li>问题2占位符？</li>
            </ul>
        </div>
        <div class="card purple">
            <h3>🟣 未知的已知</h3>
            <p>已从代码库扫描到的隐性规范：</p>
            <ul>
                <li>规范1占位符</li>
            </ul>
            <details>
                <summary>查看详细背景</summary>
                <p>这里是具体的代码引用和规范说明...</p>
            </details>
        </div>
        <div class="card red">
            <h3>🔴 未知的未知</h3>
            <p>潜在风险与盲区：</p>
            <ul>
                <li>盲区1占位符</li>
            </ul>
        </div>
    </div>
    <div class="cta">
        <p><strong>下一步：</strong> 请在对话中依次回答上述黄色和红色象限的问题，我将为您生成最终需求规格。</p>
    </div>
</body>
</html>
